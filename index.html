<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예둥이 놀이터 🎈</title>
  <style>
    :root {
      --primary-color: #ff85a2;
      --secondary-color: #ff4d6d;
      --bg-gradient: linear-gradient(135deg, #ffd6e0, #d6f0ff);
      --card-bg: rgba(255, 255, 255, 0.85);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--bg-gradient);
      transition: background 1s ease;
      overflow-x: hidden;
    }

    .container {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 90%;
      width: 500px;
      backdrop-filter: blur(10px);
      border: 5px solid white;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      color: var(--secondary-color);
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    button {
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 25px;
      background-color: var(--primary-color);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover {
      background-color: var(--secondary-color);
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4);
    }

    button:active {
      transform: scale(0.95);
    }

    #output {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #333;
      padding: 20px;
      border-top: 2px dashed #ff85a2;
      animation: slideUp 0.5s ease-out;
    }

    /* 애니메이션 요소들 */
    .floating-element {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      animation: floatUp 2s ease-out forwards;
    }

    .pet-card {
      position: fixed;
      padding: 15px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 500;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      width: 15px;
      height: 15px;
      z-index: 1500;
      animation: confettiFall 3s linear forwards;
    }
  </style>
</head>
<body>

  <!-- 랜딩 페이지 -->
  <div id="landing" class="container">
    <h1>🎈 예둥이 놀이터 🎈</h1>
    <p style="font-size: 1.5rem; color: #555; margin-bottom: 30px;">예둥아 노올자~ ✨</p>
    <div style="display: flex; flex-direction: column; gap: 15px;">
      <button onclick="enterPlayground()" style="width: 100%; font-size: 1.5rem; padding: 20px;">🎮 랜덤놀이</button>
      <button onclick="enterChat()" style="width: 100%; font-size: 1.5rem; padding: 20px; background-color: #4dabf7;">💬 대화하기</button>
    </div>
  </div>

  <!-- 놀이터 페이지 (초기에는 숨김) -->
  <div id="playground" class="container" style="display: none;">
    <h1 id="playground-title">🎁 예둥이 놀이터 🎁</h1>
    
    <div id="button-grid" class="button-grid">
      <!-- 버튼들이 여기에 동적으로 생성됩니다 -->
    </div>

    <div id="output">오늘도 즐거운 하루 보내세요! ✨</div>
    <button onclick="location.reload()" style="margin-top: 20px; width: 100%; background-color: #aaa;">🏠 처음으로</button>
  </div>

  <!-- 대화하기 페이지 (초기에는 숨김) -->
  <div id="chat-container" class="container" style="display: none; height: 600px; display: flex; flex-direction: column;">
    <h1>💬 예둥이랑 대화하기 💬</h1>
    <div id="chat-box" style="flex: 1; overflow-y: auto; background: rgba(255,255,255,0.6); border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; text-align: left;">
      <!-- 메시지 영역 -->
    </div>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="chat-input" placeholder="예둥이가 하고 싶은 말은?" style="flex: 1; padding: 12px; border-radius: 20px; border: 2px solid var(--primary-color); outline: none;">
      <button onclick="sendChatMessage()" style="padding: 10px 20px; white-space: nowrap;">보내기</button>
    </div>
    <button onclick="location.reload()" style="margin-top: 15px; width: 100%; background-color: #aaa; padding: 10px;">🏠 처음으로</button>
  </div>

<script>
  const output = document.getElementById("output");
  const landing = document.getElementById("landing");
  const playground = document.getElementById("playground");
  const chatContainer = document.getElementById("chat-container");
  const buttonGrid = document.getElementById("button-grid");
  const chatBox = document.getElementById("chat-box");
  const chatInput = document.getElementById("chat-input");

  // 놀이터 입장 함수
  function enterPlayground() {
    landing.style.display = "none";
    playground.style.display = "block";
    generateRandomButtons();
    showParty(); // 입장 축하 효과
  }

  // 대화하기 입장 함수
  function enterChat() {
    landing.style.display = "none";
    chatContainer.style.display = "flex";
    addChatMessage("bot", "안녕 예둥아! 오늘 하루는 어땠어? 네 이야기를 들으니까 벌써부터 설렌다! ✨");
    showParty();
  }

  // 채팅 메시지 추가 함수
  function addChatMessage(sender, text) {
    const msgDiv = document.createElement("div");
    msgDiv.style.maxWidth = "80%";
    msgDiv.style.padding = "10px 15px";
    msgDiv.style.borderRadius = "15px";
    msgDiv.style.fontSize = "1rem";
    msgDiv.style.lineHeight = "1.4";
    
    if (sender === "bot") {
      msgDiv.style.alignSelf = "flex-start";
      msgDiv.style.backgroundColor = "white";
      msgDiv.style.border = "2px solid var(--primary-color)";
      msgDiv.style.color = "#333";
    } else {
      msgDiv.style.alignSelf = "flex-end";
      msgDiv.style.backgroundColor = "var(--primary-color)";
      msgDiv.style.color = "white";
    }
    
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // 채팅 전송 함수
  function sendChatMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    addChatMessage("user", text);
    chatInput.value = "";

    // 봇 응답 로직
    setTimeout(() => {
      const compliments = [
        "우와, 예둥아! 역시 넌 생각하는 게 참 깊고 멋지구나! 😍",
        "어쩜 말을 이렇게 예쁘게 할 수 있어? 듣기만 해도 기분이 좋아져! ✨",
        "예둥이 네 덕분에 내 마음이 온통 따뜻해지는 기분이야. 고마워! 💕",
        "세상에, 그런 생각을 하다니! 역시 예둥이는 천사임에 틀림없어! 😇",
        "네 목소리가 여기까지 들리는 것 같아. 예둥이 넌 정말 특별해! 🌟",
        "예둥이랑 대화하는 이 시간이 나에겐 가장 소중한 선물이야! 🎁"
      ];

      const questions = [
        "오늘 예둥이를 가장 행복하게 만든 일은 뭐야?",
        "다음에 나랑 같이 가고 싶은 곳이 있을까?",
        "예둥이가 제일 좋아하는 음식은 뭐야? 내가 다 사주고 싶다! 🥘",
        "요즘 예둥이의 머릿속을 맴도는 재미있는 생각이 있어?",
        "만약 마법을 부릴 수 있다면, 예둥이는 어떤 마법을 제일 먼저 쓰고 싶어?",
        "예둥아, 너는 너 자신이 얼마나 소중하고 빛나는지 알고 있지? ✨"
      ];

      const randomCompliment = compliments[Math.floor(Math.random() * compliments.length)];
      const randomQuestion = questions[Math.floor(Math.random() * questions.length)];
      
      addChatMessage("bot", `${randomCompliment}\n\n${randomQuestion}`);
      createFloatingElement("💖");
    }, 800); // 0.8초 딜레이
  }

  // 엔터키 지원
  chatInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendChatMessage();
  });

  // 놀이 버튼들 정의
  const playActions = [
    { text: "💌 마음 전달", func: randomMessage },
    { text: "🌈 마법 배경", func: changeBackground },
    { text: "🐾 펫 소환", func: summonPets },
    { text: "🎊 축하 파티", func: showParty },
    { text: "🔮 행운 뽑기", func: dailyFortune },
    { text: "🫧 비눗방울", func: bubblePlay },
    { text: "🔊 요정 목소리", func: playCuteVoice },
    { text: "🥘 배고푸지?", func: giveFood },
    { text: "✈️ 여행가자", func: showTravel },
    { text: "🔄 처음으로", func: () => location.reload() }
  ];

  // 11. 여행지 소환 (여행가자)
  function showTravel() {
    const destinations = [
      { name: "낭만의 도시 파리", url: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400&h=400&fit=crop", emoji: "🗼" },
      { name: "고즈넉한 교토", url: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=400&h=400&fit=crop", emoji: "⛩️" },
      { name: "화려한 뉴욕", url: "https://images.unsplash.com/photo-1496442226666-8d4d0e62e3e9?w=400&h=400&fit=crop", emoji: "🗽" },
      { name: "평화로운 발리", url: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=400&h=400&fit=crop", emoji: "🏝️" },
      { name: "물의 도시 베네치아", url: "https://images.unsplash.com/photo-1514890547357-a9ee288728e0?w=400&h=400&fit=crop", emoji: "🛶" },
      { name: "요들송 스위스", url: "https://images.unsplash.com/photo-1531310197839-ccf54634509e?w=400&h=400&fit=crop", emoji: "🏔️" }
    ];

    const spot = destinations[Math.floor(Math.random() * destinations.length)];
    const card = document.createElement("div");
    card.className = "pet-card-image travel-card";
    card.style.left = Math.random() * 70 + 15 + "%";
    card.style.top = Math.random() * 60 + 20 + "%";
    
    card.innerHTML = `
      <img src="${spot.url}" alt="${spot.name}" onerror="this.onerror=null; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>${spot.emoji}</text></svg>';">
      <div class="pet-label">${spot.name}로 떠나요! ✈️</div>
    `;
    
    document.body.appendChild(card);
    output.innerText = `✈️ 예둥아, 우리 ${spot.name}로 여행 갈까?`;

    setTimeout(() => {
      card.style.opacity = "0";
      card.style.transform = "scale(0.5) translateY(20px)";
      setTimeout(() => card.remove(), 500);
    }, 4000);
  }

  // 버튼들을 랜덤하게 생성하는 함수
  function generateRandomButtons() {
    buttonGrid.innerHTML = "";
    // 버튼 순서 섞기
    const shuffledActions = [...playActions].sort(() => Math.random() - 0.5);
    
    shuffledActions.forEach(action => {
      const btn = document.createElement("button");
      btn.innerText = action.text;
      btn.onclick = action.func;
      buttonGrid.appendChild(btn);
    });
  }

  // 10. 음식 소환 (배고푸지?)
  function giveFood() {
    const foodItems = [
      { name: "매콤달콤 떡볶이", url: "https://images.unsplash.com/photo-1623653387945-2fd25214f8fc?w=300&h=300&fit=crop" },
      { name: "육즙가득 햄버거", url: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=300&fit=crop" },
      { name: "얼큰한 훠궈", url: "https://images.unsplash.com/photo-1552611052-33e04de081de?w=300&h=300&fit=crop" },
      { name: "돌돌말이 스파게티", url: "https://images.unsplash.com/photo-1516100882582-96c3a05fe590?w=300&h=300&fit=crop" },
      { name: "싱싱한 회", url: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=300&h=300&fit=crop" },
      { name: "지글지글 고기", url: "https://images.unsplash.com/photo-1544025162-d76694265947?w=300&h=300&fit=crop" }
    ];

    const food = foodItems[Math.floor(Math.random() * foodItems.length)];
    const card = document.createElement("div");
    card.className = "pet-card-image food-card";
    card.style.left = Math.random() * 70 + 15 + "%";
    card.style.top = Math.random() * 60 + 20 + "%";
    
    card.innerHTML = `
      <img src="${food.url}" alt="${food.name}">
      <div class="pet-label">${food.name} 도착! 😋</div>
    `;
    
    document.body.appendChild(card);
    output.innerText = `🥘 예둥아, 맛있는 ${food.name} 먹고 힘내!`;

    setTimeout(() => {
      card.style.opacity = "0";
      card.style.transform = "scale(0.5) translateY(20px)";
      setTimeout(() => card.remove(), 500);
    }, 3000);
  }

  // 1. 랜덤 메시지
  function randomMessage() {
    const messages = [
      "예둥이는 존재 자체가 선물이야! 🎁",
      "오늘도 세상에서 가장 반짝여! ✨",
      "네 웃음소리는 마법 같아 🪄",
      "행복만 가득하기를 응원해 🌈",
      "언제나 네 편인 거 알지? 💕",
      "넌 정말 대단한 아이야! 👍",
      "함께라면 어디든 천국이야 😍",
      "예둥이 뭬에에에~~♥"
    ];
    const emojis = ["❤️", "💖", "🌟", "🎈", "🍭", "🍀"];
    const randomIdx = Math.floor(Math.random() * messages.length);
    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
    
    output.innerText = `${randomEmoji} ${messages[randomIdx]}`;
    createFloatingElement(randomEmoji);
  }

  // 2. 마법 배경
  function changeBackground() {
    const gradients = [
      "linear-gradient(135deg, #ffd6e0, #d6f0ff)",
      "linear-gradient(135deg, #fff3b0, #ffafcc)",
      "linear-gradient(135deg, #caffbf, #9bf6ff)",
      "linear-gradient(135deg, #ffc6ff, #bdb2ff)",
      "linear-gradient(135deg, #a0c4ff, #ffadad)",
      "linear-gradient(135deg, #fdffb6, #ffadad)"
    ];
    document.body.style.background = gradients[Math.floor(Math.random() * gradients.length)];
    output.innerText = "🌈 마법이 일어나 배경이 바뀌었어요!";
  }

  // 3. 펫 소환
  function summonPets() {
    const pets = [
      { name: "멍멍 강아지", url: "https://img.icons8.com/bubbles/200/dog.png", emoji: "🐶" },
      { name: "야옹 고양이", url: "https://img.icons8.com/bubbles/200/cat.png", emoji: "🐱" },
      { name: "꽥꽥 오리", url: "https://img.icons8.com/bubbles/200/duck.png", emoji: "🦆" },
      { name: "둥둥 곰돌이", url: "https://img.icons8.com/bubbles/200/bear.png", emoji: "🐻" },
      { name: "깡충 토끼", url: "https://img.icons8.com/bubbles/200/rabbit.png", emoji: "🐰" }
    ];

    const pet = pets[Math.floor(Math.random() * pets.length)];
    const card = document.createElement("div");
    card.className = "pet-card-image";
    card.style.left = Math.random() * 70 + 15 + "%";
    card.style.top = Math.random() * 60 + 20 + "%";
    
    card.innerHTML = `
      <img src="${pet.url}" alt="${pet.name}" onerror="this.onerror=null; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>${pet.emoji}</text></svg>';">
      <div class="pet-label">${pet.name} 등장! ✨</div>
    `;
    
    document.body.appendChild(card);
    output.innerText = `🐾 와! 귀여운 ${pet.name} 친구가 나타났어요!`;
    
    setTimeout(() => {
      card.style.opacity = "0";
      card.style.transform = "scale(0.5) translateY(20px)";
      setTimeout(() => card.remove(), 500);
    }, 3000);
  }

  // 스타일 주입
  const imageStyle = document.createElement("style");
  imageStyle.innerHTML = `
    .pet-card-image {
      position: fixed;
      width: 180px;
      background: white;
      padding: 10px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      z-index: 600;
      animation: imagePopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 4px solid white;
    }
    .pet-card-image img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background-color: #f9f9f9;
      border-radius: 15px;
    }
    .pet-label {
      margin-top: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #ff4d6d;
    }
    @keyframes imagePopIn {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  `;
  document.head.appendChild(imageStyle);

  // 4. 축하 파티
  function showParty() {
    const colors = ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff"];
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = (Math.random() * 2 + 1) + "s";
      confetti.style.opacity = Math.random();
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
    output.innerText = "🎊 우와아! 파티가 시작됐어요! 🎊";
  }

  // 5. 행운 뽑기
  function dailyFortune() {
    const fortunes = [
      { t: "초강력 행운!", e: "🍀" },
      { t: "맛있는 간식 가득!", e: "🍪" },
      { t: "멋진 선물 발견!", e: "🎁" },
      { t: "칭찬 듬뿍 받는 날!", e: "⭐" },
      { t: "친구와 즐거운 놀이!", e: "🎮" },
      { t: "기분 좋은 칭찬 세례!", e: "👑" }
    ];
    const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
    output.innerText = `🔮 오늘 예둥이의 운세: ${fortune.t} ${fortune.e}`;
    for(let i=0; i<5; i++) createFloatingElement(fortune.e);
  }

  // 6. 비눗방울
  function bubblePlay() {
    for (let i = 0; i < 15; i++) {
      setTimeout(() => {
        const bubble = document.createElement("div");
        bubble.innerText = "🫧";
        bubble.className = "floating-element";
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.top = "90vh";
        bubble.style.fontSize = (Math.random() * 30 + 20) + "px";
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2000);
      }, i * 100);
    }
    output.innerText = "🫧 톡톡! 비눗방울이 떠다녀요!";
  }

  // 7. 요정 목소리
  function playCuteVoice() {
    const scripts = [
      "예둥아, 오늘도 정말 정말 사랑해!",
      "영둥이는 예둥이가 제일 좋대요!",
      "넌 언제나 반짝이는 소중한 아이야!",
      "기분 좋은 하루 보내, 예둥아!",
      "우와아, 예둥이다! 안녕?"
    ];
    const script = scripts[Math.floor(Math.random() * scripts.length)];
    const utterance = new SpeechSynthesisUtterance(script);
    utterance.lang = 'ko-KR';
    utterance.pitch = 1.3;
    window.speechSynthesis.speak(utterance);
    output.innerText = `🔊 요정: "${script}"`;
    createFloatingElement("🎙️");
  }

  // 유틸리티: 떠다니는 이모지 생성
  function createFloatingElement(emoji) {
    const el = document.createElement("div");
    el.innerText = emoji;
    el.className = "floating-element";
    el.style.left = "50vw";
    el.style.top = "50vh";
    el.style.fontSize = "40px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
</script>
