<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예둥이 놀이터 🎈</title>
  <style>
    :root {
      --primary-color: #ff85a2;
      --secondary-color: #ff4d6d;
      --bg-gradient: linear-gradient(135deg, #ffd6e0, #d6f0ff);
      --card-bg: rgba(255, 255, 255, 0.85);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--bg-gradient);
      transition: background 1s ease;
      overflow-x: hidden;
    }

    .container {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 90%;
      width: 500px;
      backdrop-filter: blur(10px);
      border: 5px solid white;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      color: var(--secondary-color);
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    button {
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 25px;
      background-color: var(--primary-color);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover {
      background-color: var(--secondary-color);
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4);
    }

    button:active {
      transform: scale(0.95);
    }

    #output {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #333;
      padding: 20px;
      border-top: 2px dashed #ff85a2;
      animation: slideUp 0.5s ease-out;
    }

    /* 애니메이션 요소들 */
    .floating-element {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      animation: floatUp 2s ease-out forwards;
    }

    .pet-card {
      position: fixed;
      padding: 15px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 500;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      width: 15px;
      height: 15px;
      z-index: 1500;
      animation: confettiFall 3s linear forwards;
    }
  </style>
</head>
<body>

  <!-- 랜딩 페이지 -->
  <div id="landing" class="container">
    <h1>🎈 예둥이 놀이터 🎈</h1>
    <p style="font-size: 1.5rem; color: #555; margin-bottom: 30px;">예둥아 노올자~ ✨</p>
    <button onclick="enterPlayground()" style="width: 100%; font-size: 1.5rem; padding: 20px;">🎮 놀러가기</button>
  </div>

  <!-- 놀이터 페이지 (초기에는 숨김) -->
  <div id="playground" class="container" style="display: none;">
    <h1 id="playground-title">🎁 예둥이 놀이터 🎁</h1>
    
    <div id="button-grid" class="button-grid">
      <!-- 버튼들이 여기에 동적으로 생성됩니다 -->
    </div>

    <div id="output">오늘도 즐거운 하루 보내세요! ✨</div>
  </div>

<script>
  const output = document.getElementById("output");
  const landing = document.getElementById("landing");
  const playground = document.getElementById("playground");
  const buttonGrid = document.getElementById("button-grid");

  // 놀이터 입장 함수
  function enterPlayground() {
    landing.style.display = "none";
    playground.style.display = "block";
    generateRandomButtons();
    showParty(); // 입장 축하 효과
  }

  // 놀이 버튼들 정의
  const playActions = [
    { text: "💌 마음 전달", func: randomMessage },
    { text: "🌈 마법 배경", func: changeBackground },
    { text: "🐾 펫 소환", func: summonPets },
    { text: "🎊 축하 파티", func: showParty },
    { text: "🔮 행운 뽑기", func: dailyFortune },
    { text: "🫧 비눗방울", func: bubblePlay },
    { text: "🔊 요정 목소리", func: playCuteVoice },
    { text: "🥘 배고푸지?", func: giveFood },
    { text: "🔄 처음으로", func: () => location.reload() }
  ];

  // 버튼들을 랜덤하게 생성하는 함수
  function generateRandomButtons() {
    buttonGrid.innerHTML = "";
    // 버튼 순서 섞기
    const shuffledActions = [...playActions].sort(() => Math.random() - 0.5);
    
    shuffledActions.forEach(action => {
      const btn = document.createElement("button");
      btn.innerText = action.text;
      btn.onclick = action.func;
      buttonGrid.appendChild(btn);
    });
  }

  // 10. 음식 소환 (배고푸지?)
  function giveFood() {
    const foodItems = [
      { name: "매콤달콤 떡볶이", url: "https://images.unsplash.com/photo-1623653387945-2fd25214f8fc?w=300&h=300&fit=crop" },
      { name: "육즙가득 햄버거", url: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=300&fit=crop" },
      { name: "얼큰한 훠궈", url: "https://images.unsplash.com/photo-1552611052-33e04de081de?w=300&h=300&fit=crop" },
      { name: "돌돌말이 스파게티", url: "https://images.unsplash.com/photo-1516100882582-96c3a05fe590?w=300&h=300&fit=crop" },
      { name: "싱싱한 회", url: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=300&h=300&fit=crop" },
      { name: "지글지글 고기", url: "https://images.unsplash.com/photo-1544025162-d76694265947?w=300&h=300&fit=crop" }
    ];

    const food = foodItems[Math.floor(Math.random() * foodItems.length)];
    const card = document.createElement("div");
    card.className = "pet-card-image food-card";
    card.style.left = Math.random() * 70 + 15 + "%";
    card.style.top = Math.random() * 60 + 20 + "%";
    
    card.innerHTML = `
      <img src="${food.url}" alt="${food.name}">
      <div class="pet-label">${food.name} 도착! 😋</div>
    `;
    
    document.body.appendChild(card);
    output.innerText = `🥘 예둥아, 맛있는 ${food.name} 먹고 힘내!`;

    setTimeout(() => {
      card.style.opacity = "0";
      card.style.transform = "scale(0.5) translateY(20px)";
      setTimeout(() => card.remove(), 500);
    }, 3000);
  }

  // 1. 랜덤 메시지
  function randomMessage() {
    const messages = [
      "예둥이는 존재 자체가 선물이야! 🎁",
      "오늘도 세상에서 가장 반짝여! ✨",
      "네 웃음소리는 마법 같아 🪄",
      "행복만 가득하기를 응원해 🌈",
      "언제나 네 편인 거 알지? 💕",
      "넌 정말 대단한 아이야! 👍",
      "함께라면 어디든 천국이야 😍",
      "예둥이 뭬에에에~~♥"
    ];
    const emojis = ["❤️", "💖", "🌟", "🎈", "🍭", "🍀"];
    const randomIdx = Math.floor(Math.random() * messages.length);
    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
    
    output.innerText = `${randomEmoji} ${messages[randomIdx]}`;
    createFloatingElement(randomEmoji);
  }

  // 2. 마법 배경
  function changeBackground() {
    const gradients = [
      "linear-gradient(135deg, #ffd6e0, #d6f0ff)",
      "linear-gradient(135deg, #fff3b0, #ffafcc)",
      "linear-gradient(135deg, #caffbf, #9bf6ff)",
      "linear-gradient(135deg, #ffc6ff, #bdb2ff)",
      "linear-gradient(135deg, #a0c4ff, #ffadad)",
      "linear-gradient(135deg, #fdffb6, #ffadad)"
    ];
    document.body.style.background = gradients[Math.floor(Math.random() * gradients.length)];
    output.innerText = "🌈 마법이 일어나 배경이 바뀌었어요!";
  }

  // 3. 펫 소환
  function summonPets() {
    const petImages = [
      "https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?w=300&h=300&fit=crop",
      "https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=300&h=300&fit=crop",
      "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=300&h=300&fit=crop",
      "https://images.unsplash.com/photo-1591160674255-fc33bb68997a?w=300&h=300&fit=crop",
      "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?w=300&h=300&fit=crop",
      "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=300&h=300&fit=crop",
      "https://images.unsplash.com/photo-1472491235688-bdc81a63246e?w=300&h=300&fit=crop"
    ];
    
    const randomImg = petImages[Math.floor(Math.random() * petImages.length)];
    const card = document.createElement("div");
    card.className = "pet-card-image";
    card.style.left = Math.random() * 70 + 15 + "%";
    card.style.top = Math.random() * 60 + 20 + "%";
    
    card.innerHTML = `
      <img src="${randomImg}" alt="귀여운 펫">
      <div class="pet-label">귀요미 등장! ✨</div>
    `;
    
    document.body.appendChild(card);
    output.innerText = `🐾 와! 진짜 귀여운 친구가 나타났어요!`;
    
    setTimeout(() => {
      card.style.opacity = "0";
      card.style.transform = "scale(0.5) translateY(20px)";
      setTimeout(() => card.remove(), 500);
    }, 3000);
  }

  // 스타일 주입
  const imageStyle = document.createElement("style");
  imageStyle.innerHTML = `
    .pet-card-image {
      position: fixed;
      width: 180px;
      background: white;
      padding: 10px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      z-index: 600;
      animation: imagePopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 4px solid white;
    }
    .pet-card-image img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 15px;
    }
    .pet-label {
      margin-top: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #ff4d6d;
    }
    @keyframes imagePopIn {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  `;
  document.head.appendChild(imageStyle);

  // 4. 축하 파티
  function showParty() {
    const colors = ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff"];
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = (Math.random() * 2 + 1) + "s";
      confetti.style.opacity = Math.random();
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
    output.innerText = "🎊 우와아! 파티가 시작됐어요! 🎊";
  }

  // 5. 행운 뽑기
  function dailyFortune() {
    const fortunes = [
      { t: "초강력 행운!", e: "🍀" },
      { t: "맛있는 간식 가득!", e: "🍪" },
      { t: "멋진 선물 발견!", e: "🎁" },
      { t: "칭찬 듬뿍 받는 날!", e: "⭐" },
      { t: "친구와 즐거운 놀이!", e: "🎮" },
      { t: "기분 좋은 칭찬 세례!", e: "👑" }
    ];
    const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
    output.innerText = `🔮 오늘 예둥이의 운세: ${fortune.t} ${fortune.e}`;
    for(let i=0; i<5; i++) createFloatingElement(fortune.e);
  }

  // 6. 비눗방울
  function bubblePlay() {
    for (let i = 0; i < 15; i++) {
      setTimeout(() => {
        const bubble = document.createElement("div");
        bubble.innerText = "🫧";
        bubble.className = "floating-element";
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.top = "90vh";
        bubble.style.fontSize = (Math.random() * 30 + 20) + "px";
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2000);
      }, i * 100);
    }
    output.innerText = "🫧 톡톡! 비눗방울이 떠다녀요!";
  }

  // 7. 요정 목소리
  function playCuteVoice() {
    const scripts = [
      "예둥아, 오늘도 정말 정말 사랑해!",
      "예리쌤은 예둥이가 제일 좋대요!",
      "넌 언제나 반짝이는 소중한 아이야!",
      "기분 좋은 하루 보내, 예둥아!",
      "우와아, 예둥이다! 안녕?"
    ];
    const script = scripts[Math.floor(Math.random() * scripts.length)];
    const utterance = new SpeechSynthesisUtterance(script);
    utterance.lang = 'ko-KR';
    utterance.pitch = 1.3;
    window.speechSynthesis.speak(utterance);
    output.innerText = `🔊 요정: "${script}"`;
    createFloatingElement("🎙️");
  }

  // 유틸리티: 떠다니는 이모지 생성
  function createFloatingElement(emoji) {
    const el = document.createElement("div");
    el.innerText = emoji;
    el.className = "floating-element";
    el.style.left = "50vw";
    el.style.top = "50vh";
    el.style.fontSize = "40px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
</script>

</body>
</html>
