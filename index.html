<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예둥이 놀이터 🎈</title>
  <style>
    :root {
      --primary-color: #ff85a2;
      --secondary-color: #ff4d6d;
      --bg-gradient: linear-gradient(135deg, #ffd6e0, #d6f0ff);
      --card-bg: rgba(255, 255, 255, 0.85);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--bg-gradient);
      transition: background 1s ease;
      overflow-x: hidden;
    }

    .container {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 90%;
      width: 500px;
      backdrop-filter: blur(10px);
      border: 5px solid white;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      color: var(--secondary-color);
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    button {
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 25px;
      background-color: var(--primary-color);
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover {
      background-color: var(--secondary-color);
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4);
    }

    button:active {
      transform: scale(0.95);
    }

    #output {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #333;
      padding: 20px;
      border-top: 2px dashed #ff85a2;
      animation: slideUp 0.5s ease-out;
    }

    /* 애니메이션 요소들 */
    .floating-element {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      animation: floatUp 2s ease-out forwards;
    }

    .pet-card {
      position: fixed;
      padding: 15px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 500;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      width: 15px;
      height: 15px;
      z-index: 1500;
      animation: confettiFall 3s linear forwards;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎁 예둥이 놀이터 🎁</h1>
    
    <div class="button-grid">
      <button onclick="randomMessage()">💌 마음 전달</button>
      <button onclick="changeBackground()">🌈 마법 배경</button>
      <button onclick="summonPets()">🐾 펫 소환</button>
      <button onclick="showParty()">🎊 축하 파티</button>
      <button onclick="dailyFortune()">🔮 행운 뽑기</button>
      <button onclick="bubblePlay()">🫧 비눗방울</button>
      <button onclick="playCuteVoice()">🔊 요정 목소리</button>
      <button onclick="resetPlayground()">🔄 다시 시작</button>
    </div>

    <div id="output">오늘도 즐거운 하루 보내세요! ✨</div>
  </div>

<script>
  const output = document.getElementById("output");

  // 1. 랜덤 메시지
  function randomMessage() {
    const messages = [
      "예둥이는 존재 자체가 선물이야! 🎁",
      "오늘도 세상에서 가장 반짝여! ✨",
      "네 웃음소리는 마법 같아 🪄",
      "행복만 가득하기를 응원해 🌈",
      "언제나 네 편인 거 알지? 💕",
      "넌 정말 대단한 아이야! 👍",
      "함께라면 어디든 천국이야 😍"
    ];
    const emojis = ["❤️", "💖", "🌟", "🎈", "🍭", "🍀"];
    const randomIdx = Math.floor(Math.random() * messages.length);
    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
    
    output.innerText = `${randomEmoji} ${messages[randomIdx]}`;
    createFloatingElement(randomEmoji);
  }

  // 2. 마법 배경
  function changeBackground() {
    const gradients = [
      "linear-gradient(135deg, #ffd6e0, #d6f0ff)",
      "linear-gradient(135deg, #fff3b0, #ffafcc)",
      "linear-gradient(135deg, #caffbf, #9bf6ff)",
      "linear-gradient(135deg, #ffc6ff, #bdb2ff)",
      "linear-gradient(135deg, #a0c4ff, #ffadad)",
      "linear-gradient(135deg, #fdffb6, #ffadad)"
    ];
    document.body.style.background = gradients[Math.floor(Math.random() * gradients.length)];
    output.innerText = "🌈 마법이 일어나 배경이 바뀌었어요!";
  }

  // 3. 펫 소환
  function summonPets() {
    const pets = [
      { name: "오둥이", emoji: "🦆" },
      { name: "시바", emoji: "🐕" },
      { name: "댕댕이", emoji: "🐶" },
      { name: "고양이", emoji: "🐱" },
      { name: "햄찌", emoji: "🐹" },
      { name: "토끼", emoji: "🐰" }
    ];
    
    const pet = pets[Math.floor(Math.random() * pets.length)];
    const card = document.createElement("div");
    card.className = "pet-card";
    card.style.left = Math.random() * 80 + 10 + "%";
    card.style.top = Math.random() * 80 + 10 + "%";
    card.innerHTML = `
      <span style="font-size: 50px;">${pet.emoji}</span>
      <span style="font-weight: bold; color: #555;">${pet.name}</span>
    `;
    document.body.appendChild(card);
    
    output.innerText = `🐾 ${pet.name} 친구가 놀러왔어요!`;
    
    setTimeout(() => card.remove(), 3000);
  }

  // 4. 축하 파티
  function showParty() {
    const colors = ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff"];
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = (Math.random() * 2 + 1) + "s";
      confetti.style.opacity = Math.random();
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
    output.innerText = "🎊 우와아! 파티가 시작됐어요! 🎊";
  }

  // 5. 행운 뽑기
  function dailyFortune() {
    const fortunes = [
      { t: "초강력 행운!", e: "🍀" },
      { t: "맛있는 간식 가득!", e: "🍪" },
      { t: "멋진 선물 발견!", e: "🎁" },
      { t: "칭찬 듬뿍 받는 날!", e: "⭐" },
      { t: "친구와 즐거운 놀이!", e: "🎮" },
      { t: "기분 좋은 칭찬 세례!", e: "👑" }
    ];
    const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
    output.innerText = `🔮 오늘 예둥이의 운세: ${fortune.t} ${fortune.e}`;
    for(let i=0; i<5; i++) createFloatingElement(fortune.e);
  }

  // 6. 비눗방울
  function bubblePlay() {
    for (let i = 0; i < 15; i++) {
      setTimeout(() => {
        const bubble = document.createElement("div");
        bubble.innerText = "🫧";
        bubble.className = "floating-element";
        bubble.style.left = Math.random() * 100 + "vw";
        bubble.style.top = "90vh";
        bubble.style.fontSize = (Math.random() * 30 + 20) + "px";
        document.body.appendChild(bubble);
        setTimeout(() => bubble.remove(), 2000);
      }, i * 100);
    }
    output.innerText = "🫧 톡톡! 비눗방울이 떠다녀요!";
  }

  // 7. 요정 목소리 (TTS)
  function playCuteVoice() {
    const scripts = [
      "예둥아, 오늘도 정말 정말 사랑해!",
      "예리쌤은 예둥이가 제일 좋대요!",
      "넌 언제나 반짝이는 소중한 아이야!",
      "기분 좋은 하루 보내, 예둥아!",
      "우와아, 예둥이다! 안녕?"
    ];
    const script = scripts[Math.floor(Math.random() * scripts.length)];
    
    const utterance = new SpeechSynthesisUtterance(script);
    utterance.lang = 'ko-KR';
    utterance.pitch = 1.8;
    utterance.rate = 1.2;
    
    window.speechSynthesis.speak(utterance);
    output.innerText = `🔊 요정: "${script}"`;
    createFloatingElement("🎙️");
  }

  // 8. 다시 시작
  function resetPlayground() {
    document.body.style.background = "linear-gradient(135deg, #ffd6e0, #d6f0ff)";
    output.innerText = "🔄 다시 신나게 놀아볼까요?";
    // 떠다니는 것들 다 지우기
    const elements = document.querySelectorAll(".pet-card, .floating-element, .confetti");
    elements.forEach(el => el.remove());
  }

  // 유틸리티: 떠다니는 이모지 생성
  function createFloatingElement(emoji) {
    const el = document.createElement("div");
    el.innerText = emoji;
    el.className = "floating-element";
    el.style.left = "50vw";
    el.style.top = "50vh";
    el.style.fontSize = "40px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
</script>

</body>
</html>
